<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Авто-холст 500x100000 | Живое изображение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0b16;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 16px 10px;
            min-height: 100vh;
            
        }
        h1 {
            font-weight: 300;
            font-size: 1.9rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #b77aff, #ff8ec4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .sub {
            font-size: 0.9rem;
            
            margin-bottom: 18px;
            text-align: center;
            border-bottom: 1px dashed #333366;
            padding-bottom: 10px;
            width: 100%;
            max-width: 500px;
        }
        .canvas-wrapper {
            background: #12121f;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            border: 1px solid #2e2e52;
            overflow: hidden;
            width: 100%;
            max-width: 520px;
        }
        #canvasContainer {
            overflow: auto;
            max-height: 78vh;
            height: 600px;
            background: #0a0a14;
            scroll-behavior: smooth;
        }
        canvas {
            display: block;
            width: 500px;
            height: 100000px;
            image-rendering: pixelated;
            background: #14142a;
            cursor: crosshair;
        }
        .panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px 18px;
            margin-top: 18px;
            padding: 12px 20px;
            background: #1a1a30;
            border-radius: 60px;
            border: 1px solid #383860;
            width: 100%;
            max-width: 500px;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            background: #252540;
            padding: 5px 16px;
            border-radius: 40px;
            border-left: 3px solid #7c5cbf;
        }
        .badge-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #44dd88;
            box-shadow: 0 0 8px #44dd88aa;
        }
        .coords {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: #0e0e1e;
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid #3d3d6a;
            font-size: 0.85rem;
            color: #c8c8ff;
        }
        .btn {
            background: #2f2f5a;
            border: none;
            color: #f0f0ff;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid #5a5a8a;
            transition: 0.15s;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: #4a4a7a;
            border-color: #8a8ac0;
            box-shadow: 0 0 12px #4a4a8a55;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a32ee;
            backdrop-filter: blur(6px);
            padding: 12px 28px;
            border-radius: 60px;
            border-left: 6px solid #b07cff;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            font-size: 0.95rem;
            color: #f2ecff;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
            border: 1px solid #4d3d7a;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
        }
        @media (max-width: 540px) {
            .panel { gap: 10px; border-radius: 30px; padding: 12px 14px; }
            .status-badge { font-size: 0.75rem; padding: 3px 12px; }
        }
    </style>
</head>
<body>

<h1>⚡ ЖИВОЙ ХОЛСТ</h1>
<div class="sub">500 × 100 000 • авто-рисование • реальное время</div>

<div class="canvas-wrapper">
    <div id="canvasContainer">
        <canvas id="pixelCanvas" width="500" height="100000"></canvas>
    </div>
</div>

<div class="panel">
    <span class="status-badge"><span class="badge-dot" id="statusDot"></span><span id="statusText">онлайн</span></span>
    <span class="coords" id="coordsDisplay">📍 0, 0</span>
    <button class="btn" id="resetViewBtn">⟲ сброс</button>
    <button class="btn" id="triggerAutoBtn">🎨 авто-вспышка</button>
</div>

<div id="toastMessage" class="toast">✨ пиксель обновлён</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function() {
        // --- КОНФИГ SUPABASE (публичный) ---
        const SUPABASE_URL = 'https://kdvsfanszsygkgmpmtrp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkdnNmYW5zenN5Z2tnbXBtdHJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTUzMjg4NDEsImV4cCI6MjAzMDkwNDg0MX0.Z5Pv7b4RpxL9e8b3gT_1H4kO2pZxQvYkL5gWXhJcRfI';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- DOM ---
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const coordsDisplay = document.getElementById('coordsDisplay');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const toastEl = document.getElementById('toastMessage');

        const W = 500;
        const H = 100000;
        const TOTAL_PIXELS = W * H;

        // --- буфер изображения (RGBA) ---
        let imageData = new ImageData(W, H);
        let data = imageData.data; // Uint8ClampedArray

        // --- заполнение фона (тёмный градиент) ---
        function fillBackground() {
            for (let y = 0; y < H; y++) {
                for (let x = 0; x < W; x++) {
                    const idx = (y * W + x) * 4;
                    // плавный переход от тёмно-синего к фиолетовому
                    const t = y / H;
                    const r = 12 + 18 * t;
                    const g = 8 + 14 * t;
                    const b = 30 + 40 * t;
                    data[idx] = r;
                    data[idx+1] = g;
                    data[idx+2] = b;
                    data[idx+3] = 255;
                }
            }
        }
        fillBackground();

        // --- рендер всего холста ---
        function render() {
            ctx.putImageData(imageData, 0, 0);
        }
        render();

        // --- установка пикселя (x, y) в цвет hex ---
        function setPixel(x, y, hexColor) {
            if (x < 0 || x >= W || y < 0 || y >= H) return false;
            let r, g, b;
            if (hexColor.startsWith('#')) {
                const c = hexColor.slice(1);
                if (c.length === 3) {
                    r = parseInt(c[0]+c[0], 16);
                    g = parseInt(c[1]+c[1], 16);
                    b = parseInt(c[2]+c[2], 16);
                } else if (c.length === 6) {
                    r = parseInt(c.substring(0,2), 16);
                    g = parseInt(c.substring(2,4), 16);
                    b = parseInt(c.substring(4,6), 16);
                } else return false;
            } else return false;

            const idx = (y * W + x) * 4;
            data[idx] = r;
            data[idx+1] = g;
            data[idx+2] = b;
            data[idx+3] = 255;

            // рисование одного пикселя (оптимизация)
            const single = new ImageData(new Uint8ClampedArray([r, g, b, 255]), 1, 1);
            ctx.putImageData(single, x, y);
            return true;
        }

        // --- генерация случайного яркого цвета ---
        function randomBrightColor() {
            const hue = Math.floor(Math.random() * 360);
            return `hsl(${hue}, 85%, 65%)`;
        }

        // --- преобразование hsl в hex (для БД и setPixel) ---
        function hslToHex(h, s, l) {
            s /= 100;
            l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
            const toHex = (x) => Math.round(255 * x).toString(16).padStart(2, '0');
            return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
        }

        function randomHexColor() {
            const h = Math.floor(Math.random() * 360);
            const s = 70 + Math.floor(Math.random() * 30);
            const l = 55 + Math.floor(Math.random() * 35);
            return hslToHex(h, s, l);
        }

        // --- отображение тоста ---
        function showToast(text, isError = false) {
            toastEl.textContent = text;
            toastEl.style.borderLeftColor = isError ? '#ff6b7c' : '#b07cff';
            toastEl.classList.add('show');
            clearTimeout(toastEl._hideTimer);
            toastEl._hideTimer = setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2500);
        }

        // --- СОХРАНЕНИЕ В БД ---
        async function savePixelToDB(x, y, hexColor) {
            try {
                const { error } = await supabase
                    .from('pixels')
                    .insert([{ x, y, color: hexColor }]);
                if (error) {
                    console.error('DB insert error:', error);
                    return false;
                }
                return true;
            } catch (e) {
                console.error('savePixelToDB error:', e);
                return false;
            }
        }

        // --- ЗАГРУЗКА ВСЕХ ПИКСЕЛЕЙ ИЗ БД ---
        async function fetchAllPixels() {
            try {
                const { data: rows, error } = await supabase
                    .from('pixels')
                    .select('x, y, color');
                if (error) {
                    console.warn('fetch error:', error);
                    statusText.textContent = 'ошибка БД';
                    statusDot.style.background = '#ff6b7c';
                    return false;
                }
                // Сброс на фон
                fillBackground();
                if (rows && rows.length > 0) {
                    for (const p of rows) {
                        const x = p.x, y = p.y;
                        if (x < 0 || x >= W || y < 0 || y >= H) continue;
                        const hex = p.color;
                        let r, g, b;
                        if (hex.startsWith('#')) {
                            const c = hex.slice(1);
                            if (c.length === 3) {
                                r = parseInt(c[0]+c[0], 16);
                                g = parseInt(c[1]+c[1], 16);
                                b = parseInt(c[2]+c[2], 16);
                            } else if (c.length === 6) {
                                r = parseInt(c.substring(0,2), 16);
                                g = parseInt(c.substring(2,4), 16);
                                b = parseInt(c.substring(4,6), 16);
                            } else continue;
                        } else continue;
                        const idx = (y * W + x) * 4;
                        data[idx] = r;
                        data[idx+1] = g;
                        data[idx+2] = b;
                        data[idx+3] = 255;
                    }
                }
                render();
                statusText.textContent = 'онлайн';
                statusDot.style.background = '#44dd88';
                return true;
            } catch (e) {
                console.error('fetchAllPixels error', e);
                return false;
            }
        }

        // --- ПОДПИСКА НА ИЗМЕНЕНИЯ (realtime) ---
        function subscribeToPixels() {
            const channel = supabase
                .channel('pixels-channel')
                .on(
                    'postgres_changes',
                    {
                        event: 'INSERT',
                        schema: 'public',
                        table: 'pixels'
                    },
                    (payload) => {
                        const p = payload.new;
                        if (!p) return;
                        const x = p.x, y = p.y, color = p.color;
                        if (x === undefined || y === undefined || !color) return;
                        setPixel(x, y, color);
                    }
                )
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        statusText.textContent = 'онлайн';
                        statusDot.style.background = '#44dd88';
                    } else {
                        statusText.textContent = 'офлайн';
                        statusDot.style.background = '#ff8844';
                    }
                });
        }

        // --- АВТОМАТИЧЕСКАЯ ГЕНЕРАЦИЯ ИЗОБРАЖЕНИЯ (постепенное заполнение) ---
        // Генерируем случайные пиксели, но с осмысленным паттерном — волны + шум
        function generateArtPattern() {
            // Заполняем фон градиентом (уже есть)
            // Создаём несколько "струй" и узоров
            for (let i = 0; i < 3000; i++) {
                const x = Math.floor(Math.random() * W);
                const y = Math.floor(Math.random() * H);
                // цвет зависит от позиции
                const hue = (x / W * 180 + y / H * 120 + Math.random() * 30) % 360;
                const sat = 70 + Math.random() * 30;
                const lig = 50 + Math.random() * 40;
                const hex = hslToHex(hue, sat, lig);
                setPixel(x, y, hex);
                // асинхронно сохраняем в БД (но не ждём, чтобы не тормозить)
                savePixelToDB(x, y, hex).catch(() => {});
            }
            showToast('🎨 Сгенерировано 3000 пикселей');
        }

        // --- Одиночная "вспышка" — добавляем 50 случайных пикселей ---
        async function autoFlash() {
            const count = 80;
            let saved = 0;
            for (let i = 0; i < count; i++) {
                const x = Math.floor(Math.random() * W);
                const y = Math.floor(Math.random() * H);
                const color = randomHexColor();
                setPixel(x, y, color);
                const ok = await savePixelToDB(x, y, color);
                if (ok) saved++;
            }
            showToast(`✨ +${saved} пикселей`);
        }

        // --- Обработчик клика по canvas (ручная установка) ---
        async function handleCanvasClick(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let cx, cy;
            if (e.touches) {
                cx = e.touches[0].clientX;
                cy = e.touches[0].clientY;
            } else {
                cx = e.clientX;
                cy = e.clientY;
            }

            let x = Math.floor((cx - rect.left) * scaleX);
            let y = Math.floor((cy - rect.top) * scaleY);
            x = Math.min(W-1, Math.max(0, x));
            y = Math.min(H-1, Math.max(0, y));

            coordsDisplay.textContent = `📍 ${x}, ${y}`;

            const color = randomHexColor();
            setPixel(x, y, color);
            const ok = await savePixelToDB(x, y, color);
            if (ok) {
                showToast(`✅ пиксель (${x}, ${y})`);
            } else {
                showToast('❌ не сохранено', true);
                // откат — перезагрузим с БД
                await fetchAllPixels();
            }
        }

        // --- инициализация ---
        async function init() {
            await fetchAllPixels();
            subscribeToPixels();

            // события
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('touchstart', handleCanvasClick, { passive: false });

            // координаты мыши
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let x = Math.floor((e.clientX - rect.left) * scaleX);
                let y = Math.floor((e.clientY - rect.top) * scaleY);
                x = Math.min(W-1, Math.max(0, x));
                y = Math.min(H-1, Math.max(0, y));
                coordsDisplay.textContent = `📍 ${x}, ${y}`;
            });

            // кнопка сброса скролла
            document.getElementById('resetViewBtn').addEventListener('click', () => {
                container.scrollTop = 0;
                container.scrollLeft = 0;
            });

            // кнопка авто-вспышка
            document.getElementById('triggerAutoBtn').addEventListener('click', () => {
                autoFlash();
            });

            // При старте — запускаем автоматическую генерацию изображения
            setTimeout(() => {
                generateArtPattern();
            }, 600);

            console.log('🚀 Холст 500x100000 авто-генерация запущена');
        }

        init();
    })();
</script>
</body>
</html>
